name: Publish @zpl-kit/react-zpl

on:
  push:
    tags:
      - 'react-zpl/v*'
  workflow_dispatch:

# 두 잡 모두 레포 쓰기 권한이 필요 없다. publish 잡은 NPM_TOKEN을 들고 있으므로
# GITHUB_TOKEN 범위는 최소로 둔다.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build zpl-core
        run: pnpm --filter @zpl-kit/zpl-core build

      - name: Build react-zpl
        run: pnpm --filter @zpl-kit/react-zpl build

      - name: Run tests
        run: pnpm --filter @zpl-kit/tests test --run

  publish:
    needs: test
    runs-on: ubuntu-latest
    # provenance(--provenance)의 OIDC 서명에 id-token이 필요하다. test 잡은
    # 쓰지 않으므로 워크플로 기본값(contents: read)을 두고 여기서만 부여한다.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build zpl-core
        run: pnpm --filter @zpl-kit/zpl-core build

      - name: Build react-zpl
        run: pnpm --filter @zpl-kit/react-zpl build

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # provenance 생성을 트리거하는 실제 스위치. pnpm 10.x의 --provenance
          # 플래그는 npm CLI로 위임되며 no-op이라, env로 켜야 서명이 첨부된다.
          NPM_CONFIG_PROVENANCE: true
        run: |
          set -euo pipefail
          NAME="$(node -p "require('./apps/react-zpl/package.json').name")"
          VERSION="$(node -p "require('./apps/react-zpl/package.json').version")"
          # 이미 올라간 버전이면 재발행하지 않는다. npm은 덮어쓰기를 막으므로
          # 재실행·재태그 시 잡 전체가 실패하는 걸 방지한다.
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "이미 publish된 버전: ${NAME}@${VERSION} — 스킵"
            exit 0
          fi
          # 프리릴리즈(0.1.0-rc.1 등)는 latest가 아닌 rc dist-tag로 발행한다.
          case "$VERSION" in
            *-*) NPM_TAG="rc" ;;
            *)   NPM_TAG="latest" ;;
          esac
          # workspace:^ 의존성은 pnpm publish가 발행 시 범위 핀으로 치환한다.
          # 공급 출처 증명은 위 NPM_CONFIG_PROVENANCE env가 켠다.
          pnpm --filter @zpl-kit/react-zpl publish \
            --no-git-checks \
            --provenance \
            --tag "${NPM_TAG}"
