name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# deploy 잡이 pages·id-token 권한을 자체 선언하므로 최상위는 읽기만 준다.
# 최상위에 두면 build 잡까지 상속받는데, build는 pnpm install로 서드파티
# lifecycle 스크립트를 실행하는 잡이다. id-token: write가 있으면 그 코드가
# 설정된 클라우드 신뢰 정책에 대해 OIDC 토큰을 발급할 수 있다.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/doc_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      # format() keeps runtime name as github-pages; plain string fails some IDE validators.
      name: ${{ format('{0}-{1}', 'github', 'pages') }}
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
